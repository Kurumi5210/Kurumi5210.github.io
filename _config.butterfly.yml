# --------------------------------------
# Hexo Butterfly Theme Configuration
# Chinese: https://butterfly.js.org/
# --------------------------------------

# Navigation Settings
nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: false

menu:
  首页: / || fas fa-home
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  归档: /archives/ || fas fa-archive
  关于: /about/ || fas fa-heart

# Code Blocks Settings
code_blocks:
  theme: light
  macStyle: false
  height_limit: false
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: false

# Social media links
social:
  fab fa-github: https://github.com/Kurumi5210 || Github || '#24292e'
  fas fa-envelope: mailto:jaychou1620@gmail.com || Email || '#4a7dbe'

# Image Settings
favicon: /img/favicon.png

avatar:
  img: /img/avatar.png
  effect: false

disable_top_img: false
default_top_img:
index_img:
archive_img:
tag_img:
category_img:
footer_img: false
background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: false
  subtitle: 'Page Not Found'
  background:

post_meta:
  page:
    date_type: both
    date_format: date
    categories: true
    tags: false
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# Index page settings
index_site_info_top:
index_top_img_height:

subtitle:
  enable: false
  effect: true
  source: false
  sub:

index_layout: 4
index_post_content:
  method: 3
  length: 500

# Post Settings
toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href:
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: false

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: false
  style: flat
  limit_day: 365
  position: top

# Footer Settings
footer:
  nav:
  owner:
    enable: true
    since: 2025
  copyright:
    enable: true
    version: true
  custom_text:

# Aside Settings
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: chenxiao | 技术探索者
    button:
      enable: true
      icon: fab fa-github
      text: Follow Me
      link: https://github.com/Kurumi5210
  card_announcement:
    enable: true
    content: 欢迎来到 chenxiao 的博客，记录学习与成长
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: false
    orderby: random
    order: 1
  card_archives:
    enable: true
    type: monthly
    format: MMMM YYYY
    order: -1
    limit: 8
  card_post_series:
    enable: true
    series_title: false
    orderBy: 'date'
    order: -1
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Dark Mode
darkmode:
  enable: true
  button: true
  autoChangeMode: false

rightside_scroll_percent: false

# Wordcount
wordcount:
  enable: false
  post_wordcount: false
  min2read: false
  total_wordcount: false

# Busuanzi
busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# Search
search:
  use: local_search
  placeholder:
  local_search:
    preload: false
    top_n_per_article: 1
    unescape: false

# Comments
comments:
  use:
  text: true
  lazyload: false
  count: false

# Chat
chat:
  use:

# Analysis
baidu_analytics:
google_analytics:

# Beautify / Effect
theme_color:
  enable: true
  main: "#49B1F5"
  paginator: "#00c4b6"
  button_hover: "#FF7242"
  text_selection: "#00c4b6"
  link_color: "#99a9bf"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#F47466"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#00c4b6"
  blockquote_padding_color: "#49b1f5"
  blockquote_background_color: "#49b1f5"
  scrollbar_color: "#49b1f5"

category_ui:
tag_ui:

rounded_corners_ui: true
text_align_justify: false
mask:
  header: true
  footer: true

preloader:
  enable: false

# Read Mode
readmode: true

# Tags
tag_plugins:
  note: true
  gallery: true
  site_tags: true

# Footer background
footer_bg: true

# Inject CSS/JS
inject:
  head:
  bottom: